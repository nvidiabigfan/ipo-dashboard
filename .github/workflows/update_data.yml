name: Update IPO Data

on:
  schedule:
    # 매일 오전 8시 KST (= UTC 23:00 전날)
    - cron: "0 23 * * *"
  workflow_dispatch:   # 수동 실행 허용

permissions:
  contents: write
  issues: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run crawler
        run: python scripts/crawl.py

      - name: Create pricing alert issue
        if: hashFiles('data/pricing_alerts.json') != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          python3 - <<'EOF'
          import json, subprocess, sys
          with open("data/pricing_alerts.json", encoding="utf-8") as f:
              alerts = json.load(f)
          for a in alerts:
              name     = a.get("name", "")
              ticker   = a.get("ticker") or "미확정"
              price    = a.get("price")
              ipo_date = a.get("ipo_date") or "미확정"
              exchange = a.get("exchange") or "TBD"
              price_str = f"${price}" if price else "미확정"
              title = f"[IPO Pricing] {name} — 티커 {ticker} / 공모가 {price_str}"
              body = (
                  f"## {name} IPO Pricing 감지\n\n"
                  f"| 항목 | 값 |\n|---|---|\n"
                  f"| 티커 | `{ticker}` |\n"
                  f"| 공모가 | {price_str} |\n"
                  f"| 상장 예정일 | {ipo_date} |\n"
                  f"| 거래소 | {exchange} |\n\n"
                  f"### 봇 가동 체크리스트\n"
                  f"- [ ] config.yaml `ticker_code` → `{ticker}`\n"
                  f"- [ ] config.yaml `ipo_price` → `{price or 0.0}`\n"
                  f"- [ ] rsync 서버 재배포\n"
                  f"- [ ] 상장일 `test_order.py {ticker} --order` 검증\n"
                  f"- [ ] `sudo systemctl start toss-ipo-bot`\n"
              )
              result = subprocess.run(
                  ["gh", "issue", "create", "--title", title, "--body", body, "--label", "ipo-alert"],
                  capture_output=True, text=True
              )
              print(result.stdout or result.stderr)
          EOF

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/ipo_data.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update IPO data $(date +'%Y-%m-%d')"
            git push
          fi
