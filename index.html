<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPO 캘린더</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0a0f1e;
      --surface: #111827;
      --card:    #141e2e;
      --border:  #1e2d47;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --accent:  #6366f1;
      --accent2: #8b5cf6;
      --green:   #10b981;
      --blue:    #3b82f6;
      --yellow:  #f59e0b;
      --cyan:    #06b6d4;
      --red:     #f87171;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system,'Pretendard','Apple SD Gothic Neo',BlinkMacSystemFont,'Segoe UI',sans-serif;
      min-height: 100vh;
    }

    /* ─── Header ─── */
    header {
      background: linear-gradient(135deg,#0d1b3e 0%,#1a0e3d 100%);
      border-bottom: 1px solid var(--border);
      padding: 14px 28px;
      display: flex; align-items: center; justify-content: space-between;
      position: sticky; top: 0; z-index: 200;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 32px; height: 32px;
      background: linear-gradient(135deg,var(--accent),var(--accent2));
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 15px; font-weight: 800; color: #fff;
    }
    .logo-text { font-size: 17px; font-weight: 700; letter-spacing: -.5px; }
    .logo-sub  { font-size: 11px; color: var(--muted); }
    .updated-badge {
      font-size: 11px; color: var(--muted);
      background: rgba(255,255,255,.04); border: 1px solid var(--border);
      padding: 4px 10px; border-radius: 20px;
    }
    .updated-badge span { color: var(--cyan); font-weight: 600; }

    /* ─── Stats ─── */
    .stats-bar {
      display: grid; grid-template-columns: repeat(4,1fr);
      background: var(--border); border-bottom: 1px solid var(--border); gap: 1px;
    }
    .stat-item { background: var(--surface); padding: 10px 16px; text-align: center; }
    .stat-value { font-size: 20px; font-weight: 800; line-height: 1; }
    .stat-label { font-size: 10px; color: var(--muted); margin-top: 3px; text-transform: uppercase; letter-spacing: .5px; }

    /* ─── Controls ─── */
    .controls {
      display: flex; align-items: center; gap: 10px;
      padding: 12px 20px; background: var(--surface);
      border-bottom: 1px solid var(--border); flex-wrap: wrap;
    }
    .month-nav { display: flex; align-items: center; gap: 6px; }
    .nav-btn {
      width: 28px; height: 28px;
      background: rgba(255,255,255,.04); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); cursor: pointer;
      font-size: 13px; display: flex; align-items: center; justify-content: center;
      transition: background .15s;
    }
    .nav-btn:hover { background: rgba(99,102,241,.2); border-color: var(--accent); }
    .month-label { font-size: 15px; font-weight: 700; min-width: 100px; text-align: center; }
    .today-btn {
      padding: 4px 10px; font-size: 12px; font-weight: 600;
      background: rgba(99,102,241,.15); border: 1px solid rgba(99,102,241,.4);
      border-radius: 6px; color: var(--accent); cursor: pointer; transition: background .15s;
    }
    .today-btn:hover { background: rgba(99,102,241,.3); }
    .tabs {
      display: flex; gap: 3px;
      background: rgba(255,255,255,.04); border: 1px solid var(--border);
      border-radius: 9px; padding: 3px;
    }
    .tab-btn {
      padding: 4px 13px; border: none; background: transparent;
      color: var(--muted); font-size: 12px; font-weight: 600;
      border-radius: 6px; cursor: pointer; transition: all .15s;
    }
    .tab-btn.active {
      background: linear-gradient(135deg,var(--accent),var(--accent2)); color: #fff;
    }
    .legend { display: flex; gap: 10px; margin-left: auto; flex-wrap: wrap; }
    .legend-item { display: flex; align-items: center; gap: 5px; font-size: 11px; color: var(--muted); white-space: nowrap; }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    /* ─── Main ─── */
    main { padding: 16px 20px; max-width: 1360px; margin: 0 auto; }

    /* ─── Calendar ─── */
    .calendar {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
    }
    .cal-head {
      display: grid; grid-template-columns: repeat(7,1fr);
      background: rgba(255,255,255,.03); border-bottom: 1px solid var(--border);
    }
    .cal-head-cell {
      padding: 9px 6px; text-align: center;
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .5px;
    }
    .cal-head-cell:first-child { color: var(--red); }
    .cal-head-cell:last-child  { color: #60a5fa; }

    /* Week row = day numbers row + events row */
    .week-row { border-bottom: 1px solid var(--border); }
    .week-row:last-child { border-bottom: none; }

    .week-days {
      display: grid; grid-template-columns: repeat(7,1fr);
      border-bottom: 1px solid rgba(255,255,255,.04);
    }
    .day-cell {
      padding: 6px 8px; min-height: 32px;
      border-right: 1px solid rgba(255,255,255,.04);
    }
    .day-cell:last-child { border-right: none; }

    .day-num {
      font-size: 12px; font-weight: 600;
      width: 22px; height: 22px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%;
    }
    .day-num.today    { background: var(--accent); color: #fff; }
    .day-num.out      { color: #263347; }
    .day-num.sun      { color: var(--red); }
    .day-num.sat      { color: #60a5fa; }

    /* Event bars grid */
    .week-events {
      display: grid;
      grid-template-columns: repeat(7,1fr);
      grid-auto-rows: 20px;
      gap: 1px 0;
      padding: 2px 0 4px;
      position: relative;
    }
    .week-events:empty { display: none; }

    .ev-bar {
      height: 19px; margin: 0 2px;
      border-radius: 3px;
      display: flex; align-items: center;
      padding: 0 5px;
      font-size: 10.5px; font-weight: 600;
      cursor: pointer; overflow: hidden; white-space: nowrap; text-overflow: ellipsis;
      transition: filter .15s;
      user-select: none;
    }
    .ev-bar:hover { filter: brightness(1.25); }

    /* Type colors */
    .ev-sub   { background: rgba(16,185,129,.22); color: #34d399; border-left: 2px solid var(--green); }
    .ev-list  { background: rgba(59,130,246,.22); color: #60a5fa; border-left: 2px solid var(--blue);  }
    .ev-intl  { background: rgba(139,92,246,.22); color: #a78bfa; border-left: 2px solid var(--accent2); }
    .ev-done  { background: rgba(100,116,139,.18); color: #94a3b8; border-left: 2px solid var(--muted); }
    .ev-tbd   { background: rgba(245,158,11,.18); color: #fbbf24; border-left: 2px solid var(--yellow); }

    /* Clipped bars (continuation across week boundary) */
    .ev-clip-left  { border-left: none; border-radius: 0 3px 3px 0; padding-left: 8px; }
    .ev-clip-right { border-radius: 3px 0 0 3px; padding-right: 8px; }
    .ev-clip-left.ev-clip-right { border-radius: 0; }

    /* More overflow */
    .more-btn {
      font-size: 10px; color: var(--muted); padding: 0 6px;
      cursor: pointer; white-space: nowrap;
      display: flex; align-items: center;
    }
    .more-btn:hover { color: var(--accent); }

    /* ─── Detail panel ─── */
    .overlay {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,.55); backdrop-filter: blur(2px);
    }
    .overlay.open { display: block; }
    .panel {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: 360px; background: #0f1a2e;
      border-left: 1px solid var(--border);
      z-index: 301;
      transform: translateX(100%);
      transition: transform .22s cubic-bezier(.4,0,.2,1);
      overflow-y: auto; display: flex; flex-direction: column;
    }
    .panel.open { transform: translateX(0); }
    .panel-hd {
      padding: 18px 20px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: flex-start;
      position: sticky; top: 0; background: #0f1a2e; z-index: 1;
    }
    .panel-title { font-size: 17px; font-weight: 700; line-height: 1.3; }
    .panel-sub   { font-size: 12px; color: var(--muted); margin-top: 3px; }
    .close-btn {
      width: 26px; height: 26px; flex-shrink: 0;
      background: rgba(255,255,255,.06); border: none; border-radius: 6px;
      color: var(--muted); font-size: 15px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    .close-btn:hover { color: var(--text); background: rgba(255,255,255,.12); }
    .panel-body { padding: 18px 20px; flex: 1; }
    .p-row { margin-bottom: 14px; }
    .p-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 3px; }
    .p-value { font-size: 14px; font-weight: 600; }
    .p-badge {
      display: inline-flex; align-items: center; gap: 6px;
      font-size: 12px; font-weight: 700; padding: 3px 10px; border-radius: 20px;
    }
    .p-link {
      display: block; margin-top: 18px; padding: 9px;
      background: rgba(99,102,241,.1); border: 1px solid rgba(99,102,241,.3);
      border-radius: 8px; color: var(--accent); text-decoration: none;
      text-align: center; font-size: 12px; font-weight: 600;
    }
    .p-link:hover { background: rgba(99,102,241,.2); }
    .p-div { border-top: 1px solid var(--border); margin: 14px 0; }

    /* ─── Empty / Loading ─── */
    .cal-msg { text-align: center; padding: 40px 20px; color: var(--muted); font-size: 13px; }
    .loading  { display: flex; align-items: center; justify-content: center; gap: 10px; color: var(--muted); padding: 60px; }
    .spinner  { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Footer ─── */
    footer { margin-top: 20px; border-top: 1px solid var(--border); padding: 14px 20px; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 6px; }
    footer span { font-size: 11px; color: var(--muted); }
    footer a { font-size: 11px; color: var(--muted); text-decoration: none; margin-left: 10px; }
    footer a:hover { color: var(--accent); }

    /* ─── Responsive ─── */
    @media(max-width:640px){
      header { padding: 12px 14px; }
      .stats-bar { grid-template-columns: repeat(2,1fr); }
      main { padding: 10px; }
      .controls { padding: 8px 10px; gap: 6px; }
      .legend { display: none; }
      .panel { width: 100%; right: 0; left: 0; top: auto; bottom: 0; height: 65vh; border-left: none; border-top: 1px solid var(--border); }
      .ev-bar { font-size: 9.5px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">I</div>
    <div>
      <div class="logo-text">IPO 캘린더</div>
      <div class="logo-sub">국내외 공모주 일정</div>
    </div>
  </div>
  <div class="updated-badge">업데이트 <span id="updated-time">—</span></div>
</header>

<div class="stats-bar">
  <div class="stat-item"><div class="stat-value" id="s-total"  style="color:var(--text)">—</div><div class="stat-label">전체</div></div>
  <div class="stat-item"><div class="stat-value" id="s-sub"    style="color:var(--green)">—</div><div class="stat-label">청약중</div></div>
  <div class="stat-item"><div class="stat-value" id="s-coming" style="color:var(--blue)">—</div><div class="stat-label">청약예정</div></div>
  <div class="stat-item"><div class="stat-value" id="s-done"   style="color:var(--muted)">—</div><div class="stat-label">완료</div></div>
</div>

<div class="controls">
  <div class="month-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
    <div class="month-label" id="month-label">—</div>
    <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
  </div>
  <button class="today-btn" onclick="goToday()">오늘</button>

  <div class="tabs">
    <button class="tab-btn active" data-tab="domestic"      onclick="switchTab('domestic')">국내</button>
    <button class="tab-btn"        data-tab="international" onclick="switchTab('international')">해외</button>
    <button class="tab-btn"        data-tab="all"           onclick="switchTab('all')">전체</button>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:rgba(16,185,129,.7)"></div>청약기간</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(59,130,246,.7)"></div>상장일</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(139,92,246,.7)"></div>해외 IPO</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(245,158,11,.7)"></div>상장검토중</div>
  </div>
</div>

<main>
  <div id="cal-wrap">
    <div class="loading"><div class="spinner"></div> 불러오는 중...</div>
  </div>
</main>

<footer>
  <span>데이터는 매일 08:00 KST 자동 갱신됩니다. 투자 책임은 본인에게 있습니다.</span>
  <div>
    <a href="http://www.38.co.kr/html/fund/?o=k" target="_blank">38커뮤니케이션</a>
    <a href="https://kind.krx.co.kr" target="_blank">KIND</a>
    <a href="https://stockanalysis.com/ipos/" target="_blank">StockAnalysis</a>
  </div>
</footer>

<!-- Detail Panel -->
<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-hd">
    <div>
      <div class="panel-title" id="p-name">—</div>
      <div class="panel-sub"  id="p-sub">—</div>
    </div>
    <button class="close-btn" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="p-body"></div>
</div>

<script>
  /* ─── State ─────────────────────────────────── */
  let allData = { domestic: [], international: [] };
  let currentTab = 'domestic';
  let viewYear, viewMonth;

  const TODAY = new Date();
  TODAY.setHours(0,0,0,0);
  viewYear  = TODAY.getFullYear();
  viewMonth = TODAY.getMonth();

  /* ─── Helpers ────────────────────────────────── */
  function pd(str) { // parseDate → local midnight
    if (!str) return null;
    const [y,m,d] = str.split('-').map(Number);
    return new Date(y, m-1, d);
  }
  function fmtDate(d) {
    if (!d) return '미정';
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  }
  function fmtMD(d) { return d ? `${d.getMonth()+1}/${d.getDate()}` : '—'; }
  function sameDay(a,b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
  function dateKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

  /* ─── Event building ─────────────────────────── */
  function buildEvents(tab) {
    const evs = [];

    if (tab === 'domestic' || tab === 'all') {
      allData.domestic.forEach(item => {
        // 청약기간 bar
        if (item.subscription_start) {
          const s = pd(item.subscription_start);
          const e = pd(item.subscription_end || item.subscription_start);
          evs.push({ type:'sub', name: item.name, start:s, end:e, item, tab:'domestic' });
        }
        // 상장일 marker
        if (item.listing_date) {
          const d = pd(item.listing_date);
          evs.push({ type:'list', name: item.name + ' 상장', start:d, end:d, item, tab:'domestic' });
        }
      });
    }

    if (tab === 'international' || tab === 'all') {
      allData.international.forEach(item => {
        if (!item.ipo_date) {
          // No date → skip in calendar (TBD items shown in list if needed)
          return;
        }
        const d = pd(item.ipo_date.substring(0,10));
        const isDone    = d <= TODAY;
        const isExpected = !isDone && (d - TODAY) > 60 * 86400000;
        const evType = isDone ? 'done' : isExpected ? 'tbd' : 'intl';
        evs.push({ type: evType, name: item.name, start:d, end:d, item, tab:'international' });
      });
    }

    return evs;
  }

  /* ─── Lane assignment ────────────────────────── */
  function assignLanes(evs) {
    evs.sort((a,b) => a.startCol - b.startCol || (b.endCol-b.startCol) - (a.endCol-a.startCol));
    const laneEnds = [];
    evs.forEach(ev => {
      let lane = laneEnds.findIndex(end => end <= ev.startCol);
      if (lane === -1) lane = laneEnds.length;
      laneEnds[lane] = ev.endCol;
      ev.lane = lane;
    });
    return evs;
  }

  /* ─── Calendar weeks ─────────────────────────── */
  function getWeeks(year, month) {
    const first = new Date(year, month, 1);
    const last  = new Date(year, month+1, 0);
    const start = new Date(first);
    start.setDate(start.getDate() - start.getDay()); // back to Sunday
    const weeks = [];
    let cur = new Date(start);
    while (cur <= last || weeks.length === 0) {
      const week = [];
      for (let i=0; i<7; i++) { week.push(new Date(cur)); cur.setDate(cur.getDate()+1); }
      weeks.push(week);
      if (cur > last && cur.getDay() === 0) break;
    }
    return weeks;
  }

  /* ─── Render calendar ────────────────────────── */
  function renderCalendar() {
    const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    document.getElementById('month-label').textContent = `${viewYear}년 ${MONTHS[viewMonth]}`;

    const weeks  = getWeeks(viewYear, viewMonth);
    const events = buildEvents(currentTab);
    const MAX_LANES = 5;

    let html = `<div class="calendar">
      <div class="cal-head">
        <div class="cal-head-cell">일</div>
        <div class="cal-head-cell">월</div>
        <div class="cal-head-cell">화</div>
        <div class="cal-head-cell">수</div>
        <div class="cal-head-cell">목</div>
        <div class="cal-head-cell">금</div>
        <div class="cal-head-cell">토</div>
      </div>`;

    weeks.forEach(week => {
      const wStart = week[0], wEnd = week[6];

      // Day numbers row
      html += '<div class="week-row"><div class="week-days">';
      week.forEach((day, i) => {
        const out = day.getMonth() !== viewMonth;
        const isTod = sameDay(day, TODAY);
        let cls = '';
        if (isTod)     cls = 'today';
        else if (out)  cls = 'out';
        else if (i===0) cls = 'sun';
        else if (i===6) cls = 'sat';
        html += `<div class="day-cell"><div class="day-num ${cls}">${day.getDate()}</div></div>`;
      });
      html += '</div>';

      // Events for this week
      const weekEvs = events
        .filter(ev => ev.start <= wEnd && ev.end >= wStart)
        .map(ev => {
          const clipL = ev.start < wStart;
          const clipR = ev.end > wEnd;
          const sc = clipL ? 1 : ev.start.getDay() + 1;
          const ec = clipR ? 8 : ev.end.getDay() + 2;
          return { ...ev, startCol:sc, endCol:ec, clipL, clipR };
        });

      assignLanes(weekEvs);

      const visible = weekEvs.filter(ev => ev.lane < MAX_LANES);
      const hidden  = weekEvs.filter(ev => ev.lane >= MAX_LANES);

      if (visible.length > 0) {
        const maxLane = Math.max(...visible.map(e => e.lane));
        html += `<div class="week-events" style="grid-template-rows:repeat(${maxLane+1},20px)">`;

        visible.forEach(ev => {
          const clipClass = (ev.clipL ? ' ev-clip-left' : '') + (ev.clipR ? ' ev-clip-right' : '');
          const typeClass = `ev-${ev.type}`;
          const label = ev.clipL ? `← ${ev.name}` : ev.name;
          html += `<div class="ev-bar ${typeClass}${clipClass}"
                     style="grid-column:${ev.startCol}/${ev.endCol};grid-row:${ev.lane+1}"
                     data-name="${escAttr(ev.item.name)}" data-tab="${ev.tab}">
                     ${escHtml(label)}
                   </div>`;
        });

        // "+N more" per day column if any hidden
        if (hidden.length > 0) {
          const moreByCols = {};
          hidden.forEach(ev => {
            for (let c = ev.startCol; c < ev.endCol; c++) {
              moreByCols[c] = (moreByCols[c] || 0) + 1;
            }
          });
          Object.entries(moreByCols).forEach(([col, n]) => {
            html += `<div class="more-btn" style="grid-column:${col};grid-row:${maxLane+2}">+${n}</div>`;
          });
        }

        html += '</div>';
      }

      html += '</div>'; // .week-row
    });

    html += '</div>'; // .calendar
    document.getElementById('cal-wrap').innerHTML = html;

    // Attach click handlers
    document.querySelectorAll('.ev-bar').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        openPanel(el.dataset.name, el.dataset.tab);
      });
    });
  }

  /* ─── Detail panel ───────────────────────────── */
  function openPanel(name, tab) {
    const items = tab === 'domestic' ? allData.domestic : allData.international;
    const item  = items.find(i => i.name === name);
    if (!item) return;

    document.getElementById('p-name').textContent = item.name;

    let sub = '', body = '';

    if (tab === 'domestic') {
      sub = `${item.market || ''}${item.sector ? ' · ' + item.sector : ''}`;
      const subRange = item.subscription_start
        ? `${fmtDate(pd(item.subscription_start))} ~ ${fmtDate(pd(item.subscription_end))}`
        : '미정';
      body = `
        <div class="p-row"><div class="p-label">청약 기간</div><div class="p-value">${subRange}</div></div>
        ${item.listing_date ? `<div class="p-row"><div class="p-label">상장일</div><div class="p-value">${fmtDate(pd(item.listing_date))}</div></div>` : ''}
        ${item.refund_date  ? `<div class="p-row"><div class="p-label">환불일</div><div class="p-value">${fmtDate(pd(item.refund_date))}</div></div>`  : ''}
        <div class="p-div"></div>
        ${item.offer_price  ? `<div class="p-row"><div class="p-label">확정 공모가</div><div class="p-value" style="color:var(--yellow)">${item.offer_price} 원</div></div>` : ''}
        ${item.price_band   ? `<div class="p-row"><div class="p-label">희망 공모가</div><div class="p-value">${item.price_band} 원</div></div>` : ''}
        ${item.competition_ratio ? `<div class="p-row"><div class="p-label">청약 경쟁률</div><div class="p-value" style="color:var(--cyan)">${item.competition_ratio}</div></div>` : ''}
        <div class="p-div"></div>
        ${item.sector       ? `<div class="p-row"><div class="p-label">섹터</div><div class="p-value">${item.sector}</div></div>` : ''}
        ${item.note         ? `<div class="p-row"><div class="p-label">비고</div><div class="p-value" style="color:var(--yellow)">${item.note}</div></div>` : ''}
        <a class="p-link" href="${item.source_url || '#'}" target="_blank">38커뮤니케이션에서 보기 ↗</a>
      `;
    } else {
      sub = `${item.exchange || 'TBD'}${item.sector ? ' · ' + item.sector : ''}`;
      body = `
        <div class="p-row"><div class="p-label">IPO 예정일</div><div class="p-value">${fmtDate(pd(item.ipo_date ? item.ipo_date.substring(0,10) : null))}</div></div>
        ${item.price     ? `<div class="p-row"><div class="p-label">공모가</div><div class="p-value" style="color:var(--yellow)">$${item.price}</div></div>` : ''}
        ${item.valuation ? `<div class="p-row"><div class="p-label">기업가치</div><div class="p-value" style="color:var(--cyan)">${item.valuation}</div></div>` : ''}
        ${item.raised    ? `<div class="p-row"><div class="p-label">조달 규모</div><div class="p-value" style="color:var(--green)">${item.raised}</div></div>` : ''}
        ${item.description ? `<div class="p-div"></div><div class="p-row"><div class="p-label">설명</div><div class="p-value" style="font-size:13px;font-weight:400;line-height:1.6;color:var(--muted)">${item.description}</div></div>` : ''}
        <a class="p-link" href="${item.source_url || '#'}" target="_blank">상세 정보 보기 ↗</a>
      `;
    }

    document.getElementById('p-sub').textContent  = sub;
    document.getElementById('p-body').innerHTML   = body;

    document.getElementById('overlay').classList.add('open');
    document.getElementById('panel').classList.add('open');
  }

  function closePanel() {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('panel').classList.remove('open');
  }

  /* ─── Stats ──────────────────────────────────── */
  function updateStats() {
    let total = 0, sub = 0, coming = 0, done = 0;
    const check = (tab, items) => {
      items.forEach(item => {
        total++;
        if (tab === 'domestic') {
          const s = pd(item.subscription_start), e = pd(item.subscription_end);
          const l = pd(item.listing_date);
          if (l && TODAY > l) done++;
          else if (s && TODAY >= s && e && TODAY <= e) sub++;
          else coming++;
        } else {
          const d = item.ipo_date ? pd(item.ipo_date.substring(0,10)) : null;
          if (!d || d > TODAY) coming++;
          else done++;
        }
      });
    };
    check('domestic', allData.domestic);
    check('international', allData.international);
    document.getElementById('s-total').textContent  = total;
    document.getElementById('s-sub').textContent    = sub;
    document.getElementById('s-coming').textContent = coming;
    document.getElementById('s-done').textContent   = done;
  }

  /* ─── Navigation ──────────────────────────────── */
  function changeMonth(delta) {
    viewMonth += delta;
    if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
    if (viewMonth > 11) { viewMonth = 0;  viewYear++; }
    renderCalendar();
  }
  function goToday() {
    viewYear  = TODAY.getFullYear();
    viewMonth = TODAY.getMonth();
    renderCalendar();
  }
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    renderCalendar();
  }

  /* ─── Escape utils ────────────────────────────── */
  function escAttr(s) { return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  /* ─── Time format ─────────────────────────────── */
  function fmtUpdated(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  /* ─── Bootstrap ──────────────────────────────── */
  fetch('data/ipo_data.json')
    .then(r => r.json())
    .then(data => {
      allData = data;
      document.getElementById('updated-time').textContent = fmtUpdated(data.updated_at);
      updateStats();
      renderCalendar();
    })
    .catch(() => {
      document.getElementById('cal-wrap').innerHTML = '<div class="cal-msg">데이터를 불러올 수 없습니다.</div>';
    });

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });
</script>
</body>
</html>
