<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>IPO 캘린더</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg:      #0a0f1e;
      --surface: #111827;
      --card:    #141e2e;
      --border:  #1e2d47;
      --text:    #e2e8f0;
      --muted:   #64748b;
      --accent:  #6366f1;
      --accent2: #8b5cf6;
      --green:   #10b981;
      --blue:    #3b82f6;
      --yellow:  #f59e0b;
      --cyan:    #06b6d4;
      --red:     #f87171;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system,'Pretendard','Apple SD Gothic Neo',BlinkMacSystemFont,'Segoe UI',sans-serif;
      min-height: 100vh; font-size: 14px;
    }

    /* Header */
    header {
      background: linear-gradient(135deg,#0d1b3e 0%,#1a0e3d 100%);
      border-bottom: 1px solid var(--border);
      padding: 14px 32px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 34px; height: 34px;
      background: linear-gradient(135deg,var(--accent),var(--accent2));
      border-radius: 8px; display: flex; align-items: center; justify-content: center;
      font-size: 16px; font-weight: 800; color: #fff;
    }
    .logo-text { font-size: 17px; font-weight: 700; }
    .logo-sub  { font-size: 12px; color: var(--muted); margin-top: 1px; }
    .header-right { display: flex; align-items: center; gap: 16px; }
    .updated-badge {
      font-size: 12px; color: var(--muted);
      background: rgba(255,255,255,.04); border: 1px solid var(--border);
      padding: 5px 12px; border-radius: 20px;
    }
    .updated-badge span { color: var(--cyan); font-weight: 600; }

    /* Stats bar */
    .stats-bar {
      display: flex; align-items: stretch;
      background: var(--surface); border-bottom: 1px solid var(--border);
      padding: 0 32px; gap: 0;
    }
    .stat-item {
      padding: 10px 28px 10px 0; display: flex; align-items: center; gap: 10px;
      border-right: 1px solid var(--border); margin-right: 28px;
    }
    .stat-item:last-child { border-right: none; margin-right: 0; }
    .stat-value { font-size: 22px; font-weight: 800; line-height: 1; }
    .stat-label { font-size: 11px; color: var(--muted); letter-spacing: .3px; }

    /* Controls */
    .controls {
      display: flex; align-items: center; gap: 12px;
      padding: 10px 32px; background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .month-nav { display: flex; align-items: center; gap: 6px; }
    .nav-btn {
      width: 30px; height: 30px;
      background: rgba(255,255,255,.04); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); cursor: pointer;
      font-size: 16px; display: flex; align-items: center; justify-content: center;
      transition: background .15s, border-color .15s;
    }
    .nav-btn:hover { background: rgba(99,102,241,.2); border-color: var(--accent); }
    .month-label { font-size: 16px; font-weight: 700; min-width: 110px; text-align: center; }
    .today-btn {
      padding: 5px 12px; font-size: 12px; font-weight: 600;
      background: rgba(99,102,241,.15); border: 1px solid rgba(99,102,241,.4);
      border-radius: 6px; color: var(--accent); cursor: pointer; transition: background .15s;
    }
    .today-btn:hover { background: rgba(99,102,241,.3); }
    .tabs {
      display: flex; gap: 3px;
      background: rgba(255,255,255,.04); border: 1px solid var(--border);
      border-radius: 9px; padding: 3px;
    }
    .tab-btn {
      padding: 5px 16px; border: none; background: transparent;
      color: var(--muted); font-size: 13px; font-weight: 600;
      border-radius: 6px; cursor: pointer; transition: all .15s;
    }
    .tab-btn.active {
      background: linear-gradient(135deg,var(--accent),var(--accent2)); color: #fff;
    }
    .legend { display: flex; gap: 14px; margin-left: auto; }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 12px; color: var(--muted); }
    .legend-dot { width: 10px; height: 10px; border-radius: 2px; flex-shrink: 0; }

    /* Layout: calendar + sidebar */
    .workspace {
      display: grid;
      grid-template-columns: 1fr 280px;
      gap: 20px;
      padding: 20px 32px;
      max-width: 1600px;
      margin: 0 auto;
      align-items: start;
    }

    /* Calendar */
    .calendar {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 14px; overflow: hidden;
    }
    .cal-head {
      display: grid; grid-template-columns: repeat(7,1fr);
      background: rgba(255,255,255,.03); border-bottom: 1px solid var(--border);
    }
    .cal-head-cell {
      padding: 10px 8px; text-align: center;
      font-size: 12px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .5px;
    }
    .cal-head-cell:first-child { color: var(--red); }
    .cal-head-cell:last-child  { color: #60a5fa; }

    .cal-grid {
      display: grid; grid-template-columns: repeat(7,1fr);
    }
    .day-cell {
      border-right: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 8px 7px 10px;
      min-height: 100px;
      cursor: default;
      transition: background .1s;
    }
    .day-cell:nth-child(7n) { border-right: none; }
    .day-cell:hover:not(.day-out) { background: rgba(255,255,255,.015); }

    .day-num {
      font-size: 13px; font-weight: 600;
      width: 24px; height: 24px;
      display: flex; align-items: center; justify-content: center;
      border-radius: 50%; margin-bottom: 5px;
    }
    .day-num.today    { background: var(--accent); color: #fff; }
    .day-num.out      { color: #263347; }
    .day-num.sun      { color: var(--red); }
    .day-num.sat      { color: #60a5fa; }

    .chips { display: flex; flex-direction: column; gap: 3px; }
    .chip {
      font-size: 11px; font-weight: 600;
      padding: 3px 7px; border-radius: 4px;
      cursor: pointer; line-height: 1.4;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      transition: filter .12s, transform .1s;
      user-select: none;
    }
    .chip:hover { filter: brightness(1.35); transform: translateX(1px); }

    .chip-sub   { background: rgba(16,185,129,.18);  color: #34d399; border-left: 2px solid var(--green); }
    .chip-list  { background: rgba(59,130,246,.18);  color: #93c5fd; border-left: 2px solid var(--blue); }
    .chip-intl  { background: rgba(139,92,246,.18);  color: #c4b5fd; border-left: 2px solid var(--accent2); }
    .chip-done  { background: rgba(100,116,139,.12); color: #64748b; border-left: 2px solid #334155; }

    /* Sidebar */
    .sidebar { display: flex; flex-direction: column; gap: 14px; }

    .side-card {
      background: var(--card); border: 1px solid var(--border);
      border-radius: 12px; overflow: hidden;
    }
    .side-card-hd {
      padding: 12px 16px; border-bottom: 1px solid var(--border);
      font-size: 12px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .5px;
    }
    .side-list { list-style: none; }
    .side-item {
      padding: 10px 16px; border-bottom: 1px solid rgba(255,255,255,.04);
      cursor: pointer; transition: background .12s;
      display: flex; align-items: flex-start; gap: 10px;
    }
    .side-item:last-child { border-bottom: none; }
    .side-item:hover { background: rgba(255,255,255,.03); }
    .side-date {
      font-size: 11px; font-weight: 700; color: var(--muted);
      min-width: 40px; text-align: center; line-height: 1.4;
      padding-top: 1px;
    }
    .side-date .sd-day { font-size: 18px; line-height: 1; color: var(--text); display: block; }
    .side-info { flex: 1; min-width: 0; }
    .side-name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .side-type { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .side-badge {
      font-size: 10px; font-weight: 700; padding: 2px 6px; border-radius: 3px;
      white-space: nowrap; flex-shrink: 0;
    }
    .badge-sub  { background: rgba(16,185,129,.2);  color: #34d399; }
    .badge-list { background: rgba(59,130,246,.2);  color: #93c5fd; }
    .badge-intl { background: rgba(139,92,246,.2);  color: #c4b5fd; }

    .side-empty { padding: 24px 16px; text-align: center; color: var(--muted); font-size: 12px; }

    /* Detail Panel */
    .overlay {
      display: none; position: fixed; inset: 0; z-index: 300;
      background: rgba(0,0,0,.55); backdrop-filter: blur(3px);
    }
    .overlay.open { display: block; }
    .panel {
      position: fixed; right: 0; top: 0; bottom: 0;
      width: 380px; background: #0f1a2e;
      border-left: 1px solid var(--border);
      z-index: 301;
      transform: translateX(100%);
      transition: transform .22s cubic-bezier(.4,0,.2,1);
      overflow-y: auto; display: flex; flex-direction: column;
    }
    .panel.open { transform: translateX(0); }
    .panel-hd {
      padding: 20px 22px; border-bottom: 1px solid var(--border);
      display: flex; justify-content: space-between; align-items: flex-start;
      position: sticky; top: 0; background: #0f1a2e; z-index: 1;
    }
    .panel-title { font-size: 18px; font-weight: 700; line-height: 1.3; }
    .panel-sub   { font-size: 12px; color: var(--muted); margin-top: 4px; }
    .close-btn {
      width: 28px; height: 28px; flex-shrink: 0;
      background: rgba(255,255,255,.06); border: none; border-radius: 6px;
      color: var(--muted); font-size: 16px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      transition: all .15s;
    }
    .close-btn:hover { color: var(--text); background: rgba(255,255,255,.12); }
    .panel-body { padding: 20px 22px; flex: 1; }
    .p-row { margin-bottom: 15px; }
    .p-label { font-size: 10px; color: var(--muted); text-transform: uppercase; letter-spacing: .5px; margin-bottom: 4px; }
    .p-value { font-size: 15px; font-weight: 600; }
    .p-div { border-top: 1px solid var(--border); margin: 15px 0; }
    .p-link {
      display: block; margin-top: 20px; padding: 10px;
      background: rgba(99,102,241,.1); border: 1px solid rgba(99,102,241,.3);
      border-radius: 8px; color: var(--accent); text-decoration: none;
      text-align: center; font-size: 13px; font-weight: 600;
      transition: background .15s;
    }
    .p-link:hover { background: rgba(99,102,241,.22); }

    /* Loading */
    .loading { display: flex; align-items: center; justify-content: center; gap: 10px; color: var(--muted); padding: 100px; }
    .spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--accent); border-radius: 50%; animation: spin .7s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Footer */
    footer {
      margin: 0 32px 20px; border-top: 1px solid var(--border);
      padding-top: 14px; display: flex; justify-content: space-between;
    }
    footer span { font-size: 11px; color: var(--muted); }
    footer a { font-size: 11px; color: var(--muted); text-decoration: none; margin-left: 12px; }
    footer a:hover { color: var(--accent); }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon">I</div>
    <div>
      <div class="logo-text">IPO 캘린더</div>
      <div class="logo-sub">국내외 공모주 일정</div>
    </div>
  </div>
  <div class="header-right">
    <div class="updated-badge">업데이트 <span id="updated-time">—</span></div>
  </div>
</header>

<div class="stats-bar">
  <div class="stat-item">
    <div class="stat-value" id="s-total" style="color:var(--text)">—</div>
    <div class="stat-label">전체</div>
  </div>
  <div class="stat-item">
    <div class="stat-value" id="s-sub" style="color:var(--green)">—</div>
    <div class="stat-label">청약중</div>
  </div>
  <div class="stat-item">
    <div class="stat-value" id="s-coming" style="color:var(--blue)">—</div>
    <div class="stat-label">청약예정</div>
  </div>
  <div class="stat-item">
    <div class="stat-value" id="s-done" style="color:var(--muted)">—</div>
    <div class="stat-label">완료</div>
  </div>
</div>

<div class="controls">
  <div class="month-nav">
    <button class="nav-btn" onclick="changeMonth(-1)">&#8249;</button>
    <div class="month-label" id="month-label">—</div>
    <button class="nav-btn" onclick="changeMonth(1)">&#8250;</button>
  </div>
  <button class="today-btn" onclick="goToday()">오늘</button>

  <div class="tabs">
    <button class="tab-btn active" data-tab="domestic"      onclick="switchTab('domestic')">국내</button>
    <button class="tab-btn"        data-tab="international" onclick="switchTab('international')">해외</button>
    <button class="tab-btn"        data-tab="all"           onclick="switchTab('all')">전체</button>
  </div>

  <div class="legend">
    <div class="legend-item"><div class="legend-dot" style="background:rgba(16,185,129,.8)"></div>청약기간</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(59,130,246,.8)"></div>상장일</div>
    <div class="legend-item"><div class="legend-dot" style="background:rgba(139,92,246,.8)"></div>해외 IPO</div>
  </div>
</div>

<div class="workspace">
  <div id="cal-wrap">
    <div class="loading"><div class="spinner"></div> 불러오는 중...</div>
  </div>

  <aside class="sidebar" id="sidebar">
    <div class="side-card">
      <div class="side-card-hd" id="side-hd">이번 달 일정</div>
      <ul class="side-list" id="side-list">
        <li class="side-empty">로딩 중...</li>
      </ul>
    </div>
  </aside>
</div>

<footer>
  <span>데이터는 매일 08:00 KST 자동 갱신됩니다. 투자 책임은 본인에게 있습니다.</span>
  <div>
    <a href="http://www.38.co.kr/html/fund/?o=k" target="_blank">38커뮤니케이션</a>
    <a href="https://kind.krx.co.kr" target="_blank">KIND</a>
    <a href="https://stockanalysis.com/ipos/" target="_blank">StockAnalysis</a>
  </div>
</footer>

<div class="overlay" id="overlay" onclick="closePanel()"></div>
<div class="panel" id="panel">
  <div class="panel-hd">
    <div>
      <div class="panel-title" id="p-name">—</div>
      <div class="panel-sub"  id="p-sub">—</div>
    </div>
    <button class="close-btn" onclick="closePanel()">✕</button>
  </div>
  <div class="panel-body" id="p-body"></div>
</div>

<script>
  let allData = { domestic: [], international: [] };
  let currentTab = 'domestic';
  let viewYear, viewMonth;

  const TODAY = new Date();
  TODAY.setHours(0,0,0,0);
  viewYear  = TODAY.getFullYear();
  viewMonth = TODAY.getMonth();

  function pd(str) {
    if (!str) return null;
    const [y,m,d] = str.split('-').map(Number);
    return new Date(y, m-1, d);
  }
  function fmtDate(d) {
    if (!d) return '미정';
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
  }
  function sameDay(a,b) { return a.getFullYear()===b.getFullYear() && a.getMonth()===b.getMonth() && a.getDate()===b.getDate(); }
  function addDays(d, n) { const r = new Date(d); r.setDate(r.getDate()+n); return r; }
  function escAttr(s) { return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;'); }
  function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

  function buildDayMap(tab) {
    const map = {};
    const add = (dateObj, name, type, t) => {
      if (!dateObj) return;
      const k = dateObj.toISOString().slice(0,10);
      if (!map[k]) map[k] = [];
      map[k].push({ name, type, tab: t });
    };

    if (tab === 'domestic' || tab === 'all') {
      allData.domestic.forEach(item => {
        if (item.subscription_start) {
          const s = pd(item.subscription_start);
          const e = pd(item.subscription_end || item.subscription_start);
          let cur = new Date(s);
          while (cur <= e) { add(cur, item.name, 'sub', 'domestic'); cur = addDays(cur,1); }
        }
        if (item.listing_date) {
          add(pd(item.listing_date), item.name + ' 상장', 'list', 'domestic');
        }
      });
    }

    if (tab === 'international' || tab === 'all') {
      allData.international.forEach(item => {
        if (!item.ipo_date) return;
        const d = pd(item.ipo_date.substring(0,10));
        add(d, item.name, d < TODAY ? 'done' : 'intl', 'international');
      });
    }

    return map;
  }

  /* Sidebar: unique key events for the month (sub start + listing + intl) */
  function buildSidebarItems(tab) {
    const items = [];
    const monthStart = new Date(viewYear, viewMonth, 1);
    const monthEnd   = new Date(viewYear, viewMonth+1, 0);
    const inMonth = d => d && d >= monthStart && d <= monthEnd;

    if (tab === 'domestic' || tab === 'all') {
      allData.domestic.forEach(item => {
        if (item.subscription_start) {
          const s = pd(item.subscription_start);
          if (inMonth(s)) items.push({ date: s, name: item.name, type: 'sub', label: '청약 시작', tab: 'domestic' });
        }
        if (item.listing_date) {
          const l = pd(item.listing_date);
          if (inMonth(l)) items.push({ date: l, name: item.name, type: 'list', label: '상장', tab: 'domestic' });
        }
      });
    }

    if (tab === 'international' || tab === 'all') {
      allData.international.forEach(item => {
        if (!item.ipo_date) return;
        const d = pd(item.ipo_date.substring(0,10));
        if (inMonth(d)) items.push({ date: d, name: item.name, type: d < TODAY ? 'done' : 'intl', label: 'IPO', tab: 'international' });
      });
    }

    items.sort((a,b) => a.date - b.date);
    return items;
  }

  function renderSidebar() {
    const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    document.getElementById('side-hd').textContent = `${viewYear}년 ${MONTHS[viewMonth]}`;

    const items = buildSidebarItems(currentTab);
    const list  = document.getElementById('side-list');
    if (items.length === 0) {
      list.innerHTML = '<li class="side-empty">이번 달 일정 없음</li>';
      return;
    }

    list.innerHTML = items.map(it => {
      const day = it.date.getDate();
      const dow = ['일','월','화','수','목','금','토'][it.date.getDay()];
      const badgeMap = { sub: 'badge-sub 청약', list: 'badge-list 상장', intl: 'badge-intl IPO', done: 'badge-sub 완료' };
      const [bc, bl] = (badgeMap[it.type] || 'badge-sub 기타').split(' ');
      return `<li class="side-item" data-name="${escAttr(it.name)}" data-tab="${escAttr(it.tab)}">
        <div class="side-date"><span class="sd-day">${day}</span>${dow}</div>
        <div class="side-info">
          <div class="side-name">${escHtml(it.name)}</div>
          <div class="side-type">${it.label}</div>
        </div>
        <span class="side-badge ${bc}">${bl}</span>
      </li>`;
    }).join('');

    list.querySelectorAll('.side-item').forEach(el => {
      el.addEventListener('click', () => openPanel(el.dataset.name, el.dataset.tab));
    });
  }

  function renderCalendar() {
    const MONTHS = ['1월','2월','3월','4월','5월','6월','7월','8월','9월','10월','11월','12월'];
    document.getElementById('month-label').textContent = `${viewYear}년 ${MONTHS[viewMonth]}`;

    const dayMap = buildDayMap(currentTab);

    const first = new Date(viewYear, viewMonth, 1);
    const last  = new Date(viewYear, viewMonth+1, 0);
    const cells = [];
    const startDay = new Date(first);
    startDay.setDate(startDay.getDate() - startDay.getDay());
    let cur = new Date(startDay);
    while (cur <= last || cells.length % 7 !== 0 || cells.length === 0) {
      cells.push(new Date(cur));
      cur = addDays(cur, 1);
      if (cur > last && cells.length % 7 === 0) break;
    }

    let html = `<div class="calendar">
      <div class="cal-head">
        <div class="cal-head-cell">일</div><div class="cal-head-cell">월</div>
        <div class="cal-head-cell">화</div><div class="cal-head-cell">수</div>
        <div class="cal-head-cell">목</div><div class="cal-head-cell">금</div>
        <div class="cal-head-cell">토</div>
      </div>
      <div class="cal-grid">`;

    cells.forEach(day => {
      const out   = day.getMonth() !== viewMonth;
      const isTod = sameDay(day, TODAY);
      const dow   = day.getDay();
      let numCls  = '';
      if (isTod)      numCls = 'today';
      else if (out)   numCls = 'out';
      else if (dow===0) numCls = 'sun';
      else if (dow===6) numCls = 'sat';

      const k   = day.toISOString().slice(0,10);
      const evs = (!out && dayMap[k]) ? dayMap[k] : [];

      let chipsHtml = '';
      if (evs.length > 0) {
        chipsHtml = '<div class="chips">' + evs.map(ev =>
          `<div class="chip chip-${ev.type}"
            data-name="${escAttr(ev.name.replace(' 상장',''))}"
            data-tab="${escAttr(ev.tab)}">${escHtml(ev.name)}</div>`
        ).join('') + '</div>';
      }

      html += `<div class="day-cell${out?' day-out':''}">
        <div class="day-num ${numCls}">${day.getDate()}</div>
        ${chipsHtml}
      </div>`;
    });

    html += '</div></div>';
    document.getElementById('cal-wrap').innerHTML = html;

    document.querySelectorAll('.chip').forEach(el => {
      el.addEventListener('click', e => {
        e.stopPropagation();
        openPanel(el.dataset.name, el.dataset.tab);
      });
    });

    renderSidebar();
  }

  function updateStats() {
    let total = 0, sub = 0, coming = 0, done = 0;
    allData.domestic.forEach(item => {
      total++;
      const s = pd(item.subscription_start), e = pd(item.subscription_end);
      const l = pd(item.listing_date);
      if (l && TODAY > l) done++;
      else if (s && TODAY >= s && e && TODAY <= e) sub++;
      else coming++;
    });
    allData.international.forEach(item => {
      total++;
      const d = item.ipo_date ? pd(item.ipo_date.substring(0,10)) : null;
      if (!d || d > TODAY) coming++; else done++;
    });
    document.getElementById('s-total').textContent  = total;
    document.getElementById('s-sub').textContent    = sub;
    document.getElementById('s-coming').textContent = coming;
    document.getElementById('s-done').textContent   = done;
  }

  function openPanel(name, tab) {
    const items = tab === 'domestic' ? allData.domestic : allData.international;
    const item  = items.find(i => i.name === name);
    if (!item) return;

    document.getElementById('p-name').textContent = item.name;
    let sub = '', body = '';

    if (tab === 'domestic') {
      sub = `${item.market || ''}${item.sector ? ' · ' + item.sector : ''}`;
      const subRange = item.subscription_start
        ? `${fmtDate(pd(item.subscription_start))} ~ ${fmtDate(pd(item.subscription_end))}`
        : '미정';
      body = `
        <div class="p-row"><div class="p-label">청약 기간</div><div class="p-value">${subRange}</div></div>
        ${item.listing_date ? `<div class="p-row"><div class="p-label">상장일</div><div class="p-value">${fmtDate(pd(item.listing_date))}</div></div>` : ''}
        ${item.refund_date  ? `<div class="p-row"><div class="p-label">환불일</div><div class="p-value">${fmtDate(pd(item.refund_date))}</div></div>` : ''}
        <div class="p-div"></div>
        ${item.offer_price  ? `<div class="p-row"><div class="p-label">확정 공모가</div><div class="p-value" style="color:var(--yellow)">${item.offer_price} 원</div></div>` : ''}
        ${item.price_band   ? `<div class="p-row"><div class="p-label">희망 공모가</div><div class="p-value">${item.price_band} 원</div></div>` : ''}
        ${item.competition_ratio ? `<div class="p-row"><div class="p-label">청약 경쟁률</div><div class="p-value" style="color:var(--cyan)">${item.competition_ratio}</div></div>` : ''}
        <div class="p-div"></div>
        ${item.sector ? `<div class="p-row"><div class="p-label">섹터</div><div class="p-value">${item.sector}</div></div>` : ''}
        ${item.note   ? `<div class="p-row"><div class="p-label">비고</div><div class="p-value" style="color:var(--yellow)">${item.note}</div></div>` : ''}
        <a class="p-link" href="${item.source_url || '#'}" target="_blank">38커뮤니케이션에서 보기 ↗</a>`;
    } else {
      sub = `${item.exchange || 'TBD'}${item.sector ? ' · ' + item.sector : ''}`;
      body = `
        <div class="p-row"><div class="p-label">IPO 예정일</div><div class="p-value">${fmtDate(pd(item.ipo_date ? item.ipo_date.substring(0,10) : null))}</div></div>
        ${item.price     ? `<div class="p-row"><div class="p-label">공모가</div><div class="p-value" style="color:var(--yellow)">$${item.price}</div></div>` : ''}
        ${item.valuation ? `<div class="p-row"><div class="p-label">기업가치</div><div class="p-value" style="color:var(--cyan)">${item.valuation}</div></div>` : ''}
        ${item.raised    ? `<div class="p-row"><div class="p-label">조달 규모</div><div class="p-value" style="color:var(--green)">${item.raised}</div></div>` : ''}
        ${item.description ? `<div class="p-div"></div><div class="p-row"><div class="p-label">설명</div><div class="p-value" style="font-size:13px;font-weight:400;line-height:1.6;color:var(--muted)">${item.description}</div></div>` : ''}
        <a class="p-link" href="${item.source_url || '#'}" target="_blank">상세 정보 보기 ↗</a>`;
    }

    document.getElementById('p-sub').textContent = sub;
    document.getElementById('p-body').innerHTML  = body;
    document.getElementById('overlay').classList.add('open');
    document.getElementById('panel').classList.add('open');
  }

  function closePanel() {
    document.getElementById('overlay').classList.remove('open');
    document.getElementById('panel').classList.remove('open');
  }

  function changeMonth(delta) {
    viewMonth += delta;
    if (viewMonth < 0)  { viewMonth = 11; viewYear--; }
    if (viewMonth > 11) { viewMonth = 0;  viewYear++; }
    renderCalendar();
  }
  function goToday() {
    viewYear  = TODAY.getFullYear();
    viewMonth = TODAY.getMonth();
    renderCalendar();
  }
  function switchTab(tab) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
    renderCalendar();
  }

  function fmtUpdated(iso) {
    const d = new Date(iso);
    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
  }

  fetch('data/ipo_data.json')
    .then(r => r.json())
    .then(data => {
      allData = data;
      document.getElementById('updated-time').textContent = fmtUpdated(data.updated_at);
      updateStats();
      renderCalendar();
    })
    .catch(() => {
      document.getElementById('cal-wrap').innerHTML = '<div class="loading">데이터를 불러올 수 없습니다.</div>';
    });

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closePanel(); });
</script>
</body>
</html>
